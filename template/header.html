<header id="headerPage">
	<div class="頁首">
		<h1 class="big-title"><a href="/home">
				<%= heading %>
			</a></h1>
		<label class="switch" id="dark-mode">
			<input type="checkbox" onclick="darkmode()" title="dark mode" placeholder="" />
			<span class="slider round"></span>
		</label>
	</div>
	<nav class="導航欄">
		<button class="hamburger" onclick="toggleMenu()">☰</button>
		<ul class="nav-menu">
			<li><a href="/team_intro">關於團隊</a></li>
			<li><a href="/mini_game">小遊戲</a></li>
			<li><a href="/tools">工具</a></li>
			<li><a href="/tutorials">教學</a></li>
			<li><a href="/login">管理員登入</a></li>
		</ul>
	</nav>

        <button onclick="window.location.href='/team_intro';">關於團隊</button>

</header>
<script>

	function toggleMenu() {
		const menu = document.querySelector('.nav-menu');
		menu.classList.toggle('active');
	}
</script>
<style>
	.導航欄 {
		display: flex;
		justify-content: space-around;
	}

	/* 導航欄 */

	.導航欄 {
		position: relative;
		display: flex;
		height: 60px;
		background-color: var(--navi-color);

		button:hover {
			animation-name: change-button-height;
			animation-duration: 0.1s;
			animation-iteration-count: 1;
			border: 10px solid yellow;
			background-color: yellow;
			color: black;
			font-size: 15px;
			height: 60px;
			flex: 1;
			cursor: pointer;
		}

		button {
			border: 10px solid rgb(33, 160, 160);
			background-color: rgb(33, 160, 160);
			color: white;
			font-size: 15px;
			height: 50px;
			flex: 1;
			border-radius: 0px 0px 0px 0px;
		}
	}

	.hamburger {
		display: none;
		/* 電腦隱藏 */
	}

	.nav-menu {
		display: flex;
		list-style: none;
		margin: 0;
		padding: 0;
	}

	@media (max-width: 768px) {
		.hamburger {
			display: block;
			background: none;
			border: none;
			font-size: 24px;
			cursor: pointer;
		}

		.nav-menu {
			display: none;
			/* 預設隱藏 */
			position: absolute;
			top: 100%;
			left: 0;
			width: 100%;
			background: white;
			flex-direction: column;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
		}

		.nav-menu.active {
			display: flex;
			/* 點擊展開 */
		}

		.nav-menu li {
			padding: 15px;
			text-align: center;
			border-bottom: 1px solid #eee;
		}
	}
</style>
